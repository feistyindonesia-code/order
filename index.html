<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feisty Order</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f7f7f7;
  --card:#ffffff;
  --text:#111;
  --muted:#666;
  --accent:#ff7a00;
}
body.dark{
  --bg:#0f0f0f;
  --card:#1a1a1a;
  --text:#f5f5f5;
  --muted:#9ca3af;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Poppins,sans-serif;
  background:var(--bg);
  color:var(--text);
}
header{
  padding:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #ddd;
}
.logo{font-weight:700;font-size:1.2rem}
nav a{margin-left:12px;color:var(--muted);text-decoration:none;font-size:.9rem}

section{padding:20px}
.card{
  background:var(--card);
  border-radius:14px;
  padding:16px;
  margin-bottom:16px;
}
.hero{text-align:center}
.hero h1{font-size:2rem}

label{font-size:.8rem;color:var(--muted)}
input,select{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  background:#eee;
}
body.dark input,body.dark select{background:#111;color:#fff}

.menu-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
}
@media(min-width:768px){
  .menu-grid{grid-template-columns:repeat(3,1fr)}
}
.menu-item img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
  margin-bottom:8px;
}
.badge{
  font-size:.7rem;
  background:#222;
  color:#fff;
  padding:4px 8px;
  border-radius:6px;
}
.price{font-weight:600;margin-top:6px}
.qty{
  display:flex;
  align-items:center;
  margin-top:8px;
}
.qty button{
  width:32px;
  height:32px;
  border:none;
  border-radius:8px;
  background:#333;
  color:#fff;
  font-size:1.1rem;
}
.qty span{margin:0 10px}

.summary ul{list-style:none;font-size:.9rem}
.summary li{display:flex;justify-content:space-between;margin-bottom:6px}
.total{border-top:1px solid #ccc;padding-top:8px;font-weight:700}

.btn{
  background:linear-gradient(135deg,#ff7a00,#ff3d3d);
  border:none;
  color:#fff;
  width:100%;
  padding:14px;
  border-radius:10px;
  font-size:1rem;
}

.modal{
  position:fixed;
  inset:0;
  display:none;
  background:rgba(0,0,0,.7);
  justify-content:center;
  align-items:center;
}
.modal .card{text-align:center}
footer{text-align:center;font-size:.8rem;color:var(--muted);padding:20px}
</style>
</head>

<body>

<header>
  <div class="logo">🔥 Feisty</div>
  <nav>
    <a href="#menu">Menu</a>
    <a href="#pay">Bayar</a>
  </nav>
</header>

<section class="hero">
  <h1>Order Online</h1>
  <p>Pesan cepat tanpa antre</p>
</section>

<section class="card">
  <label>Nama</label>
  <input id="nama" readonly>
  <label style="margin-top:8px">WhatsApp</label>
  <input id="wa" readonly>
</section>

<section id="menu">
  <h2>Menu</h2>
  <div class="menu-grid" id="menuList"></div>
</section>

<section class="card summary" id="pay">
  <h2>Ringkasan</h2>
  <ul id="summaryList"></ul>
  <div class="total" id="totalHarga">Total: Rp 0</div>
</section>

<section class="card">
  <h2>Pembayaran</h2>
  <select id="metode">
    <option value="QRIS">QRIS</option>
    <option value="COD">Tunai / COD</option>
  </select>
</section>

<section>
  <button class="btn" onclick="submitOrder()">Bayar Sekarang</button>
</section>

<div class="modal" id="modal">
  <div class="card">
    <h3>Order Berhasil</h3>
    <p>Pesanan telah dikirim</p>
    <button class="btn" onclick="closeModal()">Tutup</button>
  </div>
</div>

<footer>© Feisty Indonesia</footer>

<script>
/* ========= AUTO THEME ========= */
const h = new Date().getHours();
if(h >= 18 || h < 6) document.body.classList.add('dark');

/* ========= CONFIG ========= */
const API = 'https://script.google.com/macros/s/AKfycbzlY5zc9gPeKS-vdSPzQrWxIc7elRvSnPiQSgDReQyzsthBth6rdNrT1jLAWWpf3FpS9A/exec';

const menuList = document.getElementById('menuList');
const summaryList = document.getElementById('summaryList');
const totalHarga = document.getElementById('totalHarga');
let menuData = [];
const cart = {};

/* ========= AUTO FILL TEST ========= */
const q = new URLSearchParams(location.search);
document.getElementById('nama').value = q.get('nama') || 'Test User';
document.getElementById('wa').value = q.get('wa') || '08123456789';

/* ========= LOAD MENU ========= */
fetch(API)
  .then(r=>r.json())
  .then(d=>{
    menuData=d;
    renderMenu();
  });

function renderMenu(){
  menuList.innerHTML='';
  menuData.forEach(i=>{
    cart[i.id]=0;
    menuList.innerHTML+=`
      <div class="card menu-item">
        <img src="${i.gambar || 'https://via.placeholder.com/300x200'}">
        <span class="badge">${i.kategori}</span>
        <h3>${i.nama}</h3>
        <p>${i.deskripsi}</p>
        <div class="price">Rp ${i.harga.toLocaleString('id-ID')}</div>
        <div class="qty">
          <button onclick="updateQty(${i.id},-1)">-</button>
          <span id="q${i.id}">0</span>
          <button onclick="updateQty(${i.id},1)">+</button>
        </div>
      </div>`;
  });
}

function updateQty(id,c){
  cart[id]=Math.max(0,cart[id]+c);
  document.getElementById('q'+id).innerText=cart[id];
  renderSummary();
}

function renderSummary(){
  summaryList.innerHTML='';
  let total=0;
  menuData.forEach(i=>{
    if(cart[i.id]>0){
      const sub=cart[i.id]*i.harga;
      total+=sub;
      summaryList.innerHTML+=`
        <li><span>${i.nama} x${cart[i.id]}</span>
        <span>Rp ${sub.toLocaleString('id-ID')}</span></li>`;
    }
  });
  if(!total) summaryList.innerHTML='<li>Belum ada pesanan</li>';
  totalHarga.innerText='Total: Rp '+total.toLocaleString('id-ID');
}

/* ========= SUBMIT ========= */
function submitOrder(){
  const items=menuData.filter(i=>cart[i.id]>0).map(i=>({
    id:i.id,nama:i.nama,qty:cart[i.id],harga:i.harga
  }));
  if(!items.length) return alert('Pilih menu');

  fetch(API,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      nama:nama.value,
      whatsapp:wa.value,
      metode:metode.value,
      items,
      total:items.reduce((t,i)=>t+i.qty*i.harga,0)
    })
  })
  .then(()=>modal.style.display='flex');
}

function closeModal(){modal.style.display='none'}
</script>

</body>
</html>
