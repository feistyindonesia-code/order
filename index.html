<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Feisty Order</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#ffffff;
  --card:#f4f4f5;
  --text:#111827;
  --muted:#6b7280;
  --accent:#ff7a00;
}

.dark {
  --bg:#0f0f0f;
  --card:#1a1a1a;
  --text:#f9fafb;
  --muted:#9ca3af;
}

* { box-sizing:border-box; margin:0; padding:0 }
body {
  font-family:Poppins,sans-serif;
  background:var(--bg);
  color:var(--text);
}

header {
  padding:16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #e5e7eb;
}

.logo { font-weight:700; font-size:1.2rem }
nav a {
  margin-left:12px;
  text-decoration:none;
  color:var(--muted);
  font-size:.9rem;
}

section { padding:20px 16px }

.hero { text-align:center }
.hero h1 { font-size:1.9rem }
.hero p { color:var(--muted); margin-top:4px }

.menu-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:14px;
}

.card {
  background:var(--card);
  border-radius:14px;
  padding:12px;
}

.menu-card img {
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:10px;
}

.menu-card h3 {
  font-size:.95rem;
  margin:6px 0 2px;
}

.menu-card p {
  font-size:.75rem;
  color:var(--muted);
}

.price {
  font-weight:600;
  margin-top:4px;
}

.qty {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-top:8px;
}

.qty button {
  width:28px;
  height:28px;
  border:none;
  border-radius:6px;
  background:var(--accent);
  color:#fff;
  font-size:1rem;
  cursor:pointer;
}

.summary ul {
  list-style:none;
  font-size:.85rem;
}

.summary li {
  display:flex;
  justify-content:space-between;
  margin-bottom:6px;
}

.total {
  margin-top:8px;
  border-top:1px solid #ddd;
  padding-top:8px;
  font-weight:700;
}

.btn {
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#ff7a00,#ff3d3d);
  color:#fff;
  font-size:1rem;
  font-weight:600;
  cursor:pointer;
}

footer {
  text-align:center;
  font-size:.8rem;
  color:var(--muted);
  padding:20px;
}
</style>
</head>

<body>

<header>
  <div class="logo">🔥 Feisty</div>
  <nav>
    <a href="#menu">Menu</a>
    <a href="#cart">Order</a>
  </nav>
</header>

<section class="hero">
  <h1>Order Online</h1>
  <p>Pesan cepat tanpa antre</p>
</section>

<section id="menu">
  <h2>Menu</h2>
  <div class="menu-grid" id="menuList"></div>
</section>

<section id="cart" class="card summary">
  <h2>Pesanan Kamu</h2>
  <ul id="summaryList"></ul>
  <div class="total" id="totalHarga">Total: Rp 0</div>
</section>

<section>
  <button class="btn" onclick="submitOrder()">Pesan Sekarang</button>
</section>

<footer>
© 2024 Feisty
</footer>

<script>
/* ================= THEME AUTO ================= */
const hour = new Date().getHours();
if (hour < 6 || hour >= 18) document.body.classList.add('dark');

/* ================= CONFIG ================= */
const API_URL = 'https://script.google.com/macros/s/AKfycbxW6nZZs4KK_0TRZ8DuyeFfez820HGXjy4FSDIgfO4NNl0nxO-qz0go4c5FCAixK2Qg/exec';

const menuList = document.getElementById('menuList');
const summaryList = document.getElementById('summaryList');
const totalHarga = document.getElementById('totalHarga');

let menuData = [];
let cart = {};

/* ================= LOAD MENU ================= */
fetch(API_URL)
  .then(res => res.json())
  .then(data => {
    menuData = data;
    renderMenu();
  })
  .catch(() => {
    menuList.innerHTML = 'Gagal memuat menu';
  });

function renderMenu() {
  menuList.innerHTML = '';
  menuData.forEach(item => {
    cart[item.id] = 0;
    menuList.innerHTML += `
      <div class="card menu-card">
        <img src="${item.gambar}">
        <h3>${item.nama}</h3>
        <p>${item.deskripsi}</p>
        <div class="price">Rp ${item.harga.toLocaleString()}</div>
        <div class="qty">
          <button onclick="updateQty(${item.id},-1)">−</button>
          <span id="qty-${item.id}">0</span>
          <button onclick="updateQty(${item.id},1)">+</button>
        </div>
      </div>
    `;
  });
}

/* ================= CART ================= */
function updateQty(id, change) {
  cart[id] = Math.max(0, cart[id] + change);
  document.getElementById('qty-' + id).innerText = cart[id];
  renderSummary();
}

function renderSummary() {
  summaryList.innerHTML = '';
  let total = 0;

  menuData.forEach(item => {
    if (cart[item.id] > 0) {
      const sub = cart[item.id] * item.harga;
      total += sub;
      summaryList.innerHTML += `
        <li>
          <span>${item.nama} x${cart[item.id]}</span>
          <span>Rp ${sub.toLocaleString()}</span>
        </li>
      `;
    }
  });

  if (total === 0) summaryList.innerHTML = '<li>Belum ada pesanan</li>';
  totalHarga.innerText = 'Total: Rp ' + total.toLocaleString();
}

/* ================= SUBMIT ================= */
function submitOrder() {
  const items = menuData.filter(i => cart[i.id] > 0);
  if (!items.length) {
    alert('Pilih menu dulu');
    return;
  }

  alert('Order siap dikirim ke WhatsApp / QRIS');
}
</script>

</body>
</html>
