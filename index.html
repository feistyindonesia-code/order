<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feisty — Order Online</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
/* ================= THEME ================= */
:root {
  --bg: #ffffff;
  --card: #f3f4f6;
  --text: #111827;
  --muted: #6b7280;
  --accent: #ff7a00;
  --danger: #ff3d3d;
}

body.dark {
  --bg: #0f0f0f;
  --card: #1a1a1a;
  --text: #f9fafb;
  --muted: #9ca3af;
}

/* ================= BASE ================= */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Poppins', sans-serif;
  background: var(--bg);
  color: var(--text);
}

header {
  padding: 16px;
  border-bottom: 1px solid #ddd;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo {
  font-weight: 700;
  font-size: 1.2rem;
}

section { padding: 16px; }

.card {
  background: var(--card);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 16px;
}

h1 { font-size: 1.8rem; }
h2 { margin-bottom: 10px; }

input, select {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #e5e7eb;
  margin-top: 6px;
}

body.dark input,
body.dark select {
  background: #111;
  color: white;
}

small { color: var(--muted); }

/* ================= MENU ================= */
.menu-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

.menu-item img {
  width: 100%;
  height: 120px;
  object-fit: cover;
  border-radius: 10px;
}

.badge {
  font-size: 0.7rem;
  background: #00000020;
  padding: 4px 8px;
  border-radius: 6px;
  display: inline-block;
  margin-top: 6px;
}

.qty {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 8px;
}

.qty button {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  border: none;
  background: #00000020;
  font-size: 1.2rem;
  cursor: pointer;
}

/* ================= SUMMARY ================= */
.summary li {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
}

.total {
  font-weight: 700;
  border-top: 1px solid #ccc;
  padding-top: 8px;
}

/* ================= BUTTON ================= */
.btn {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 1rem;
  background: linear-gradient(135deg, var(--accent), var(--danger));
  color: white;
  cursor: pointer;
}

/* ================= MODAL ================= */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.6);
  display: none;
  justify-content: center;
  align-items: center;
}

.modal-content {
  background: var(--card);
  padding: 24px;
  border-radius: 16px;
  text-align: center;
}

footer {
  text-align: center;
  font-size: 0.8rem;
  color: var(--muted);
  padding: 24px;
}
</style>
</head>

<body>

<header>
  <div class="logo">🔥 Feisty</div>
</header>

<section class="card">
  <h1>Order Online</h1>
  <p>Pesan langsung dari WhatsApp</p>
</section>

<section class="card">
  <label>Nama</label>
  <input id="nama" readonly>

  <label style="margin-top:8px">WhatsApp</label>
  <input id="wa" readonly>

  <small>Data diambil otomatis</small>
</section>

<section>
  <h2>Menu</h2>
  <div class="menu-grid" id="menu"></div>
</section>

<section class="card">
  <h2>Ringkasan</h2>
  <ul id="summary"></ul>
  <div class="total" id="total">Total: Rp 0</div>
</section>

<section class="card">
  <h2>Pembayaran</h2>
  <select id="metode">
    <option value="QRIS">QRIS</option>
    <option value="COD">Tunai / COD</option>
  </select>
</section>

<section>
  <button class="btn" onclick="submitOrder()">Bayar Sekarang</button>
</section>

<div class="modal" id="modal">
  <div class="modal-content">
    <h3>Pesanan dikirim</h3>
    <p>Silakan lanjutkan pembayaran</p>
    <button class="btn" onclick="closeModal()">Tutup</button>
  </div>
</div>

<footer>
  © 2024 Feisty — Terima kasih
</footer>

<script>
/* ================= CONFIG ================= */
const API_URL = 'https://script.google.com/macros/s/AKfycbw3EtxqDQisNxXTS1cChwKADRg5ljqWpuX_YTdA-ZQ4rXMxK_m0wyUSpuW0YNfCC7X9xQ/exec';

const cart = {};
let menus = [];

/* ================= THEME AUTO ================= */
const hour = new Date().getHours();
if (hour >= 18 || hour < 6) document.body.classList.add('dark');

/* ================= URL PARAM ================= */
const p = new URLSearchParams(location.search);
nama.value = p.get('nama') || 'Guest';
wa.value = p.get('wa') || '08xxxxxxxxxx';

/* ================= LOAD MENU ================= */
fetch(API_URL)
  .then(r => r.json())
  .then(data => {
    menus = data;
    renderMenu();
  });

function renderMenu() {
  menu.innerHTML = '';
  menus.forEach(m => {
    cart[m.id] = 0;
    menu.innerHTML += `
      <div class="card menu-item">
        <img src="${m.gambar || 'https://dummyimage.com/300x200'}">
        <span class="badge">${m.kategori}</span>
        <h4>${m.nama}</h4>
        <p>${m.deskripsi}</p>
        <b>Rp ${m.harga.toLocaleString('id-ID')}</b>
        <div class="qty">
          <button onclick="updateQty(${m.id},-1)">-</button>
          <span id="q${m.id}">0</span>
          <button onclick="updateQty(${m.id},1)">+</button>
        </div>
      </div>`;
  });
}

function updateQty(id, c) {
  cart[id] = Math.max(0, cart[id] + c);
  document.getElementById('q'+id).innerText = cart[id];
  renderSummary();
}

function renderSummary() {
  summary.innerHTML = '';
  let total = 0;
  menus.forEach(m => {
    if (cart[m.id]) {
      const sub = cart[m.id] * m.harga;
      total += sub;
      summary.innerHTML += `
        <li><span>${m.nama} x${cart[m.id]}</span><span>Rp ${sub.toLocaleString('id-ID')}</span></li>`;
    }
  });
  totalEl = document.getElementById('total');
  totalEl.innerText = 'Total: Rp ' + total.toLocaleString('id-ID');
}

/* ================= SUBMIT ================= */
function submitOrder() {
  const items = menus.filter(m => cart[m.id] > 0)
    .map(m => ({ nama: m.nama, qty: cart[m.id], harga: m.harga }));

  if (!items.length) return alert('Pilih menu dulu');

  fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify({
      nama: nama.value,
      wa: wa.value,
      metode: metode.value,
      items
    })
  }).then(() => {
    modal.style.display = 'flex';
  });
}

function closeModal() {
  modal.style.display = 'none';
}
</script>

</body>
</html>
