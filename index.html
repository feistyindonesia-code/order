<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Feisty Order</title>

<style>
:root{
  --bg:#fff;--card:#f3f3f3;--text:#111;
  --accent:#ff4d00;
}
.dark{
  --bg:#0e0e0e;--card:#1b1b1b;--text:#fff;
}
body{
  margin:0;font-family:Inter,system-ui;
  background:var(--bg);color:var(--text);
}
header{
  padding:1rem;text-align:center;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:1rem;padding:1rem;
}
.card{
  background:var(--card);
  border-radius:14px;
  padding:1rem;
}
.card img{
  width:100%;height:120px;
  object-fit:cover;border-radius:10px;
}
.qty{
  display:flex;gap:.5rem;
  justify-content:center;
}
button{
  background:var(--accent);
  border:none;color:#fff;
  padding:.4rem .7rem;
  border-radius:6px;
}
.fixed{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--card);
  padding:1rem;
}
</style>
</head>

<body>
<header>
<h2>🔥 Feisty</h2>
<p>Order Mudah & Cepat</p>
</header>

<section class="grid" id="menu"></section>

<div class="fixed">
<select id="metode">
  <option value="QRIS">QRIS</option>
  <option value="COD">Tunai / COD</option>
</select>
<button onclick="submitOrder()">Bayar</button>
<span id="total">Rp0</span>
</div>

<script>
/* ===============================
   CONFIG
================================ */
const API = 'https://script.google.com/macros/s/AKfycbzlY5zc9gPeKS-vdSPzQrWxIc7elRvSnPiQSgDReQyzsthBth6rdNrT1jLAWWpf3FpS9A/exec';

/* ===============================
   AUTO THEME
================================ */
const hour = new Date().getHours();
if(hour >= 18 || hour < 6) document.body.classList.add('dark');

/* ===============================
   URL PARAM
================================ */
const p = new URLSearchParams(location.search);
const nama = p.get('nama') || '';
const wa = p.get('wa') || '';

let cart = {};

/* ===============================
   LOAD MENU
================================ */
fetch(API+'?action=menu')
.then(r=>r.json())
.then(data=>{
  document.getElementById('menu').innerHTML = data.map(i=>`
    <div class="card">
      ${i.gambar
        ? `<img src="${i.gambar}">`
        : `<div style="height:120px;background:#222;border-radius:10px"></div>`
      }
      <h4>${i.nama}</h4>
      <small>${i.deskripsi}</small>
      <p>Rp${i.harga}</p>
      <div class="qty">
        <button onclick="add('${i.id}',${i.harga})">+</button>
        <span id="q${i.id}">0</span>
        <button onclick="remove('${i.id}',${i.harga})">-</button>
      </div>
    </div>
  `).join('');
});

/* ===============================
   CART
================================ */
function add(id,h){
  cart[id]=(cart[id]||0)+1;
  document.getElementById('q'+id).innerText=cart[id];
  total();
}
function remove(id,h){
  if(cart[id]>0) cart[id]--;
  document.getElementById('q'+id).innerText=cart[id]||0;
  total();
}
function total(){
  let t=0;
  document.querySelectorAll('.card').forEach(c=>{
    const id=c.querySelector('button').getAttribute('onclick').match(/'(.+?)'/)[1];
  });
  for(let i in cart) t+=cart[i]*1;
  document.getElementById('total').innerText='Rp'+t;
}

/* ===============================
   SUBMIT
================================ */
function submitOrder(){
  const items = Object.keys(cart).map(id=>({id,qty:cart[id]}));
  const metode = document.getElementById('metode').value;

  fetch(API,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      nama,wa,metode,
      items,total:Object.values(cart).reduce((a,b)=>a+b,0)
    })
  })
  .then(r=>r.json())
  .then(res=>{
    alert('Order dibuat: '+res.order_id);
  });
}
</script>
</body>
</html>
